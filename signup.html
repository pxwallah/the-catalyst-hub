<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup • The Catalyst Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

/* Background Glow */

.glow1,
.glow2{
position:absolute;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
z-index:-1;
}

.glow1{
background:#2563eb;
top:-100px;
left:-100px;
opacity:0.35;
}

.glow2{
background:#7c3aed;
bottom:-100px;
right:-100px;
opacity:0.35;
}

/* Signup Box */

.signup-container{
width:100%;
max-width:460px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
padding:40px;
border-radius:30px;
box-shadow:0 0 30px rgba(255,255,255,0.03);
}

/* Heading */

.logo{
font-size:32px;
font-weight:700;
margin-bottom:10px;
background:linear-gradient(to right,#fff,#777);
background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.subtitle{
text-align:center;
color:#9ca3af;
margin-bottom:35px;
line-height:1.7;
}

/* Inputs */

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#121212;
color:white;
font-size:15px;
outline:none;
transition:0.3s;
border:1px solid transparent;
}

.input-box input:focus{
border:1px solid #2563eb;
box-shadow:0 0 12px rgba(37,99,235,0.4);
}

/* Button */

.btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(to right,#2563eb,#3b82f6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

/* Footer */

.footer{
margin-top:25px;
text-align:center;
color:#9ca3af;
font-size:14px;
}

.footer a{
color:#60a5fa;
text-decoration:none;
}

.footer a:hover{
text-decoration:underline;
}

/* Divider */

.divider{
height:1px;
background:rgba(255,255,255,0.08);
margin:25px 0;
}

/* Responsive */

@media(max-width:600px){

.signup-container{
padding:30px;
}

.logo{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="signup-container">

<div class="logo">
The Catalyst Hub
</div>

<p class="subtitle">
Create your account and begin your JEE 2027 journey with the ultimate productivity dashboard.
</p>

<form action="/register" method="POST">

<div class="input-box">

<input 
type="text"
name="username"
placeholder="Username"
required
>

</div>

<div class="input-box">

<input 
type="email"
name="email"
placeholder="Email Address"
required
>

</div>

<div class="input-box">

<input 
type="password"
name="password"
placeholder="Password"
required
>

</div>

<button type="submit" class="btn">
Create Account
</button>

</form>

<div class="divider"></div>

<div class="footer">

Already have an account?

<a href="/login.html">
Login
</a>

</div>

</div>

</body>
</html>
